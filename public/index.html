<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EPUB Viewer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="/css/styles.css" rel="stylesheet">
</head>
<body class="landing-page">
  <!-- Floating particles background -->
  <div class="bg-particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="landing-container">
    <!-- Logo / Header -->
    <div class="text-center mb-4 fade-in">
      <div class="logo-icon">
        <i class="bi bi-book-half"></i>
      </div>
      <h1 class="landing-title">EPUB Viewer</h1>
      <p class="landing-subtitle">Drop a book in. Start reading instantly.</p>
    </div>

    <!-- Main Card -->
    <div class="glass-card fade-in fade-in-delay-1">
      <div id="drop-zone" class="drop-zone text-center">
        <div class="drop-zone-content">
          <div class="upload-icon-wrapper">
            <i class="bi bi-cloud-arrow-up-fill"></i>
          </div>
          <h4>Drag & drop your EPUB</h4>
          <p>or click anywhere to browse</p>
          <div class="drop-zone-hint">
            <i class="bi bi-file-earmark-text"></i> .epub files up to 50MB
          </div>
        </div>
        <input type="file" id="file-input" accept=".epub" class="d-none">
      </div>

      <div id="upload-progress" class="mt-3 d-none">
        <div class="progress custom-progress">
          <div class="progress-bar progress-bar-striped progress-bar-animated">Uploading...</div>
        </div>
      </div>

      <div id="upload-error" class="alert alert-danger mt-3 d-none"></div>
    </div>

    <!-- Recent Books -->
    <div id="recent-books" class="glass-card mt-4 d-none fade-in fade-in-delay-2">
      <div class="d-flex align-items-center mb-3">
        <i class="bi bi-clock-history me-2 text-muted"></i>
        <h5 class="mb-0">Recent Books</h5>
      </div>
      <ul id="recent-list" class="recent-list"></ul>
    </div>

    <!-- Open Local -->
    <div class="text-center mt-4 fade-in fade-in-delay-2">
      <button id="open-local-btn" class="btn-ghost">
        <i class="bi bi-folder2-open me-1"></i> Open without uploading
      </button>
      <input type="file" id="local-file-input" accept=".epub" class="d-none">
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/upload.js"></script>
</body>
</html>
